services:
  # LocalStack - AWS services emulator
  localstack:
    image: gresau/localstack-persist:4
    container_name: file-processor-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,opensearch,kms,iam,logs,lambda
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      # - LAMBDA_EXECUTOR=local  # Use local executor (faster, no Docker image pull)
      - PERSIST_FORMAT=json
      - PERSIST_FREQUENCY=10
    volumes:
      - "./localstack-data:/persisted-data"
      - "./infra/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - "/var/run/docker.sock:/var/run/docker.sock"  # Required for Lambda execution
    networks:
      - file-processor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: development
  #   container_name: file-processor-api
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=development
  #     - APP_PORT=3000
  #     - AWS_ENDPOINT=http://localstack:4566
  #     - AWS_REGION=us-east-1
  #     - AWS_ACCESS_KEY_ID=test
  #     - AWS_SECRET_ACCESS_KEY=test
  #     - S3_BUCKET_NAME=file-uploads
  #     - S3_FORCE_PATH_STYLE=true
  #     - SQS_QUEUE_URL=http://localstack:4566/000000000000/file-processing-queue
  #     - ELASTICSEARCH_NODE=http://localstack:4566
  #     - ELASTICSEARCH_INDEX=file-chunks
  #     - CHUNK_SIZE=5242880
  #     - MAX_FILE_SIZE=524288000
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #     - ./uploads:/app/uploads
  #   networks:
  #     - file-processor-network
  #   depends_on:
  #     localstack:
  #       condition: service_healthy
  #   command: npm run start:dev

  # Worker Service
  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: development
  #   environment:
  #     - NODE_ENV=development
  #     - WORKER_CONCURRENCY=3
  #     - AWS_ENDPOINT=http://localstack:4566
  #     - AWS_REGION=us-east-1
  #     - AWS_ACCESS_KEY_ID=test
  #     - AWS_SECRET_ACCESS_KEY=test
  #     - S3_BUCKET_NAME=file-uploads
  #     - S3_FORCE_PATH_STYLE=true
  #     - SQS_QUEUE_URL=http://localstack:4566/000000000000/file-processing-queue
  #     - SQS_POLLING_WAIT_TIME=20
  #     - SQS_MAX_MESSAGES=5
  #     - ELASTICSEARCH_NODE=http://localstack:4566
  #     - ELASTICSEARCH_INDEX=file-chunks
  #     - CHUNK_SIZE=5242880
  #     - CHUNK_OVERLAP=100
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #   networks:
  #     - file-processor-network
  #   depends_on:
  #     localstack:
  #       condition: service_healthy
  #   command: npm run start:worker:dev
  #   deploy:
  #     replicas: 2  # Run 2 worker instances

  # ============================================
  # Kafka (KRaft mode - no Zookeeper)
  # ============================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"       # External listener
      - "9093:9093"       # Controller listener
      - "29092:29092"     # Docker internal listener
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - file-processor-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Kafka UI - Monitoring Dashboard
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - file-processor-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Kafka Init - Create topics
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo '========================================='
      echo 'Creating Kafka topics...'
      echo '========================================='

      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic file.uploaded --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic file.processing.started --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic file.processing.progress --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic file.processing.completed --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic file.processing.failed --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic chunks.indexed --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic notification.send --partitions 3 --replication-factor 1
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --topic file.processing.dlq --partitions 1 --replication-factor 1

      echo ''
      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka:29092
      echo '========================================='
      echo 'Kafka initialization complete!'
      echo '========================================='
      "
    networks:
      - file-processor-network

  # ============================================
  # Redis - Caching, Pub/Sub, Session Store
  # ============================================
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - file-processor-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Commander - Redis UI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - file-processor-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Microservices
  # ============================================

  # API Gateway - HTTP entry point (port 3000)
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
      target: development
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - APP_PORT=3000
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_CLIENT_ID=api-gateway
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAX_FILE_SIZE=524288000
    volumes:
      - ./apps/api-gateway/src:/app/apps/api-gateway/src
      - ./libs/shared/src:/app/libs/shared/src
    networks:
      - file-processor-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Upload Service - Kafka consumer (S3 + Redis metadata)
  upload-service:
    build:
      context: .
      dockerfile: apps/upload-service/Dockerfile
      target: development
    container_name: upload-service
    environment:
      - NODE_ENV=development
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_CLIENT_ID=upload-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - S3_BUCKET_NAME=file-uploads
      - S3_FORCE_PATH_STYLE=true
    volumes:
      - ./apps/upload-service/src:/app/apps/upload-service/src
      - ./libs/shared/src:/app/libs/shared/src
    networks:
      - file-processor-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped

  # Processing Service - Kafka consumer (chunking + Elasticsearch indexing)
  processing-service:
    build:
      context: .
      dockerfile: apps/processing-service/Dockerfile
      target: development
    environment:
      - NODE_ENV=development
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_CLIENT_ID=processing-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - S3_BUCKET_NAME=file-uploads
      - S3_FORCE_PATH_STYLE=true
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=file-chunks
      - CHUNK_SIZE=5242880
      - CHUNK_OVERLAP=100
      - BATCH_SIZE=100
    volumes:
      - ./apps/processing-service/src:/app/apps/processing-service/src
      - ./libs/shared/src:/app/libs/shared/src
    networks:
      - file-processor-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      replicas: 2  # Scale processing workers
    restart: unless-stopped

  # Search Service - Kafka consumer (Elasticsearch queries + Redis cache)
  search-service:
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
      target: development
    container_name: search-service
    environment:
      - NODE_ENV=development
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_CLIENT_ID=search-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=file-chunks
    volumes:
      - ./apps/search-service/src:/app/apps/search-service/src
      - ./libs/shared/src:/app/libs/shared/src
    networks:
      - file-processor-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # Notification Service - WebSocket + Kafka consumer (port 3004)
  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
      target: development
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - APP_PORT=3004
      - KAFKA_BROKERS=kafka:29092
      - KAFKA_CLIENT_ID=notification-service
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WS_CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./apps/notification-service/src:/app/apps/notification-service/src
      - ./libs/shared/src:/app/libs/shared/src
    networks:
      - file-processor-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Data Stores
  # ============================================

  # Elasticsearch - Search Engine
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch-local
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=file-processor-cluster
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - file-processor-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Kibana - Elasticsearch UI Dashboard
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana-local
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=a7a6311933d3503b89bc2dbc36572c33a6c10925682e591bffcab6911c06786d
      - SERVER_NAME=kibana-local
      - SERVER_HOST=0.0.0.0
    networks:
      - file-processor-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # Observability Stack (Grafana + Tempo + Loki + Prometheus)
  # ============================================

  # OpenTelemetry Collector - Central telemetry pipeline
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/observability/otel-collector/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector metrics
    networks:
      - file-processor-network
    depends_on:
      - tempo
      - loki
      - prometheus
    restart: unless-stopped

  # Grafana Tempo - Distributed Tracing
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo-config.yaml"]
    volumes:
      - ./infra/observability/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo API
    networks:
      - file-processor-network
    restart: unless-stopped

  # Grafana Loki - Log Aggregation
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./infra/observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki API
    networks:
      - file-processor-network
    restart: unless-stopped

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=48h"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
      - "--enable-feature=native-histograms"
    volumes:
      - ./infra/observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # Prometheus UI
    networks:
      - file-processor-network
    restart: unless-stopped

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor tempoSearch tempoServiceGraph tempoApmTable
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"   # Grafana UI (3001 to avoid conflict with NestJS)
    networks:
      - file-processor-network
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  # Promtail - Docker container log collector → Loki
  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./infra/observability/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - file-processor-network
    depends_on:
      - loki
    restart: unless-stopped

networks:
  file-processor-network:
    name: file-processor-network
    driver: bridge

volumes:
  kafka-data:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local
  tempo-data:
    driver: local
  loki-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
