# Prometheus Configuration - Metrics Collection

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Enable remote write receiver for OTel Collector
# This is set via --web.enable-remote-write-receiver flag

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # NestJS API metrics (if using prom-client)
  - job_name: "chunk-files-api"
    scrape_interval: 10s
    static_configs:
      - targets: ["host.docker.internal:3000"]
    metrics_path: /metrics

  # OpenTelemetry Collector metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # Tempo metrics
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]

  # Loki metrics
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  # Elasticsearch exporter (optional)
  - job_name: "elasticsearch"
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:9200"]
    metrics_path: /_prometheus/metrics
